{%extends 'base.html'%}
{%block content%}

<main role="main" class="container p-0">
  <div class="row">
    <div class="col-md-12 blog-main">
      <h2 class="text-success">Category - {{category.category_name}}</h2>


      <div class="row mb-2">
        {% for i in post %}
        <div class="col-md-12">
          <div class="card border-0">
            <div class="card-body">
              <h3 class='fw-bolder mb-1'>
                <a class='text-dark text-decoration-none' href='{% url 'single_blog' i.slug %}'>{{i.title}}</a>
              </h3>
              <small class="mb-1 text-muted"> {{i.created_at | timesince}} ago by {{i.author}} </small>
              <p class="card-text">{{i.short_description}}</p>
            </div>
          </div>
        </div>
        {%endfor%}
      </div>

    </div>

  </div><!-- /.row -->

</main><!-- /.container -->

</div>


{%endblock%}
