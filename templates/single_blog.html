{%extends 'base.html'%}
{%block content%}

<!-- Page content-->
<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8">
            <!-- Post content-->
            <article>
                <!-- Post header-->
                <header class="mb-4">
                    <!-- Post title-->
                    <h1 class="fw-bolder mb-1"> {{post.title}} </h1>
                    <!-- Post meta content-->
                    <div class="text-muted fst-italic mb-2">Posted on {{post.created_at}} </div>
                    <!-- Post category-->
                    <a class="badge bg-primary text-decoration-none text-light" href=" {% url " home" %} ">{{post.category}}</a>
                </header>
                <!-- Preview image figure-->
                <figure class=" mb-4"><img class="img-fluid rounded" src=" {{post.feature_image.url}} " alt="..." />
                        </figure>
                        <!-- Post content-->
                        <div class="card-body">
                            <div class="lead mb-4">
                                {{ post.short_description }}
                            </div>
                        </div>


        </div>
        <!-- Side widgets-->
        <div class="col-lg-4">
            <!-- Search widget-->
            <div class="card mb-4">
                <!-- Categories widget-->

                <!-- Side widget-->
                <div class="p-3 mb-3 bg-light rounded">
                    <h4 class="font-italic"> {{about_us.about_heading}} </h4>
                    <p class="mb-0">{{about_us.about_text}}</p>
                </div>


                <div class="card mb-4 p-3">
                    <div class="p-3">
                        <h4 class="font-italic">Follow Us</h4>
                        {%for i in follow_link %}
                        <ol class="list-unstyled">
                            <li><a href="{{i.platform_link}}">{{i.platform_name}}</a></li>
                        </ol>
                        {%endfor%}
                    </div>

                </div>
            </div>
        </div>
    </div>

    <div class="container-fluid">
        <section class="mb-5">
            <p class="fs-5 mb-16">{{post.blog_body}}</p>
        </section>
    </div>

    {%endblock%}
