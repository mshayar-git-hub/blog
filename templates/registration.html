{%extends 'base.html'%}

{% block content%}

{%load crispy_forms_tags%}
<h2 class='text-center'>Registration form</h2>
<form action="{%url 'register' %}" method="POST" style="width: 600px; margin: auto;" >
    {% csrf_token %}
    {{ form | crispy}}
    <button type="submit" class="btn btn-warning">SUBMIT</button>
</form>

{% endblock %}
